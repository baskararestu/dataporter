basePath: /
definitions:
  model.APIResponse:
    properties:
      data: {}
      message:
        example: job created
        type: string
      success:
        example: true
        type: boolean
    type: object
  model.CreateJobRequest:
    properties:
      batch_delay_ms:
        example: 0
        type: integer
      batch_size:
        example: 5000
        type: integer
      dry_run:
        example: false
        type: boolean
      source_table:
        example: pasien
        type: string
      target_table:
        example: pasien
        type: string
    type: object
host: dtp-api.baskararw.my.id
info:
  contact:
    name: Baskara Restu
  description: REST API for migrating patient records from EMR PostgreSQL to SIMRS
    with schema transformation.
  license:
    name: MIT
  title: DataPorter API
  version: "1.0"
paths:
  /api/dev/seed-emr-extra:
    post:
      description: Inserts 1.5M additional patients into the EMR database to simulate
        data growth. Disabled in production. Idempotent — safe to call multiple times.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/model.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Seed extra EMR data (dev only)
      tags:
      - dev
  /api/jobs:
    get:
      description: Returns all migration jobs. Optionally filter by status query parameter.
      parameters:
      - description: Filter by status (pending, running, paused, completed, failed,
          rolled_back)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: List migration jobs
      tags:
      - jobs
    post:
      consumes:
      - application/json
      description: Creates a new migration job in pending state. The job will not
        start until POST /api/jobs/{job_id}/start is called.
      parameters:
      - description: Job parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateJobRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.APIResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/model.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Create migration job
      tags:
      - jobs
  /api/jobs/{job_id}:
    get:
      description: Returns full details of a migration job. If the job is currently
        running, also includes live progress counters.
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Get migration job
      tags:
      - jobs
  /api/jobs/{job_id}/errors:
    get:
      description: Returns the full error log for a migration job as a JSON array.
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Get job errors
      tags:
      - jobs
  /api/jobs/{job_id}/rollback:
    post:
      description: Deletes all rows migrated by this job from the target DB and marks
        the job as rolled_back.
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Rollback migration job
      tags:
      - jobs
  /api/jobs/{job_id}/start:
    post:
      description: Starts or resumes a pending/paused migration job asynchronously.
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Start migration job
      tags:
      - jobs
  /api/jobs/{job_id}/stop:
    post:
      description: Signals a running migration job to pause. It can be resumed with
        the start endpoint.
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/model.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Stop (pause) migration job
      tags:
      - jobs
  /api/jobs/{job_id}/validate:
    get:
      description: |-
        Compares source row count (by ID range) against target rows accounted by the job counters.
        Uses 2 COUNT queries — no UUID generation, O(1) in round-trips regardless of row count.
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Verify migration consistency
      tags:
      - jobs
  /api/tables:
    get:
      description: Returns all source→target table pairs that the migrator supports.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: List supported tables
      tags:
      - metadata
  /healthz:
    get:
      description: Returns HTTP 200 with status ok if the service is up.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.APIResponse'
      summary: Health check
      tags:
      - metadata
schemes:
- https
- http
swagger: "2.0"
