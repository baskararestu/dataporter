services:
  dataporter:
    image: dataporter-img:latest
    build: .
    container_name: dataporter
    environment:
      EMR_DB_HOST: ${EMR_DB_HOST}
      EMR_DB_PORT: ${EMR_DB_PORT:-5432}
      EMR_DB_USER: ${EMR_DB_USER}
      EMR_DB_PASSWORD: ${EMR_DB_PASSWORD}
      EMR_DB_NAME: ${EMR_DB_NAME:-database_emr}
      EMR_DB_SSL_MODE: ${EMR_DB_SSL_MODE:-disable}
      SIMRS_DB_HOST: ${SIMRS_DB_HOST}
      SIMRS_DB_PORT: ${SIMRS_DB_PORT:-5432}
      SIMRS_DB_USER: ${SIMRS_DB_USER}
      SIMRS_DB_PASSWORD: ${SIMRS_DB_PASSWORD}
      SIMRS_DB_NAME: ${SIMRS_DB_NAME:-database_simrs}
      SIMRS_DB_SSL_MODE: ${SIMRS_DB_SSL_MODE:-disable}
      BATCH_SIZE: ${BATCH_SIZE:-5000}
      BATCH_DELAY_MS: ${BATCH_DELAY_MS:-0}
      HTTP_PORT: ${HTTP_PORT:-8090}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${HTTP_PORT:-8090}:${HTTP_PORT:-8090}"
    networks:
      - dataporter-net
    restart: unless-stopped

networks:
  dataporter-net:
    name: dataporter-net
    driver: bridge
